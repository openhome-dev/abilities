name: Publish CLI to PyPI

# Publishes the openhome-client package (in cli/) to PyPI whenever a GitHub
# Release is published. Uses PyPI Trusted Publishing (OIDC) — no API tokens or
# secrets are stored anywhere.

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build cli
      - name: Validate metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check cli/dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: cli/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/openhome-client/
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
