name: Community PR Path Check

on:
  pull_request_target:
    branches: [dev, main]

jobs:
  path-check:
    name: path-check
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.author_association != 'MEMBER' &&
      github.event.pull_request.author_association != 'OWNER'
    steps:
      - name: Check community PR only touches community folder
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });

            console.log("🔍 Checking files changed in this PR...\n");

            let violation = false;

            for (const file of files) {
              if (file.filename.startsWith('community/')) {
                console.log(`✅ ${file.filename}`);
              } else {
                console.log(`❌ ${file.filename} (NOT ALLOWED)`);
                violation = true;
              }
            }

            if (violation) {
              core.setFailed(
                "\n============================================\n" +
                "🚫 BLOCKED: Community PRs can ONLY modify:\n" +
                "   • community/your-ability-name/\n\n" +
                "   You cannot modify any other files.\n" +
                "   If you need changes elsewhere, open an\n" +
                "   issue to discuss with maintainers.\n" +
                "============================================"
              );
            } else {
              console.log("\n✅ All changed files are inside community/ folder!");
            }

  path-check-member:
    name: path-check
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.author_association == 'OWNER'
    steps:
      - run: echo "✅ Org member — all paths allowed"
